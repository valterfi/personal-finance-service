databaseChangeLog:
  - changeSet:
      id: 001-create-statement-table
      author: codex
      changes:
        - createTable:
            tableName: statement
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: reference_month
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: closing_date
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: replaced_for
                  type: BIGINT
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
