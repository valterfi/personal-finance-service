databaseChangeLog:
  - changeSet:
      id: 002-create-transaction-table
      author: codex
      changes:
        - createTable:
            tableName: transaction
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: card
                  type: VARCHAR(4)
                  constraints:
                    nullable: false
              - column:
                  name: installment
                  type: INTEGER
              - column:
                  name: total_installments
                  type: INTEGER
              - column:
                  name: memo
                  type: VARCHAR(500)
              - column:
                  name: update_memo
                  type: VARCHAR(500)
              - column:
                  name: statement_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: replaced_for
                  type: BIGINT
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: transaction
            baseColumnNames: statement_id
            constraintName: fk_transaction_statement
            referencedTableName: statement
            referencedColumnNames: id
